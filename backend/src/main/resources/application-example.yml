# ============================================================
# Spring Boot 配置文件示例
# 使用前请复制为 application.yml 并填入实际值
# ============================================================
#
# 配置说明：
# - 将下方所有 ${...} 占位符替换为你本地的实际值
# - 数据库密码建议通过环境变量传入，不要明文写在文件里
#
# 环境变量示例（Windows PowerShell）：
#   $env:DB_PASSWORD="your_password"
#   $env:DB_USERNAME="root"
#   $env:DB_NAME="pet_rescue"
#   $env:JWT_SECRET="your_secret_key"
#
# ============================================================

server:
  port: 8081
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pet_rescue?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}                 # 数据库用户名，默认 root
    password: ${DB_PASSWORD:CHANGE_ME}            # ⚠️ 请替换为你的 MySQL 密码，或设置环境变量 DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:CHANGE_ME}                 # ⚠️ 请替换为你的 JWT 密钥，建议不少于 32 位随机字符串
  expiration: 86400000                              # Token 有效期（毫秒），默认 24 小时

logging:
  level:
    com.pet.rescue: debug
    org.springframework.security: debug
