<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - 宠物救助收养系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E07A5F;
            --primary-dark: #c96a50;
            --primary-light: #f0a28a;
            --sage: #81B29A;
            --sage-light: #a8cdb8;
            --amber: #F4A261;
            --warm-white: #FDF6F0;
            --warm-cream: #FAEEE7;
            --text-dark: #3D405B;
            --text-muted: #8A8EA0;
            --card-shadow: 0 8px 32px rgba(224, 122, 95, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            display: flex;
            width: 100%;
        }

        /* ========== 左侧装饰区 ========== */
        .left-panel {
            flex: 1;
            background: linear-gradient(160deg, #FDF6F0 0%, #FAEEE7 40%, #E8D5C4 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .paw-bg {
            position: absolute;
            inset: 0;
            opacity: 0.06;
            pointer-events: none;
        }

        .paw-bg svg {
            position: absolute;
            fill: #E07A5F;
        }

        .left-content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeSlideUp 0.8s ease both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left-icon {
            font-size: 88px;
            margin-bottom: 20px;
            display: inline-block;
            animation: gentleBounce 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(224, 122, 95, 0.3));
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        .left-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0 0 8px;
            letter-spacing: -0.5px;
        }

        .left-title span { color: var(--primary); }

        .left-desc {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .feature-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: fadeSlideUp 0.8s ease both;
        }

        .feature-tag:nth-child(1) { animation-delay: 0.1s; }
        .feature-tag:nth-child(2) { animation-delay: 0.2s; }
        .feature-tag:nth-child(3) { animation-delay: 0.3s; }

        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tag-dot.red { background: var(--primary); }
        .tag-dot.green { background: var(--sage); }
        .tag-dot.amber { background: var(--amber); }

        .floating-animals {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 24px;
            opacity: 0.4;
        }

        .floating-animal {
            font-size: 28px;
            animation: floatAnimal 4s ease-in-out infinite;
        }

        .floating-animal:nth-child(2) { animation-delay: 1s; }
        .floating-animal:nth-child(3) { animation-delay: 2s; }

        @keyframes floatAnimal {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ========== 右侧表单区 ========== */
        .right-panel {
            width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 52px;
            animation: fadeSlideUp 0.8s ease 0.15s both;
        }

        .form-header {
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0 0 6px;
        }

        .form-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        .form-header .login-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .form-header .login-link:hover {
            text-decoration: underline;
        }

        /* 角色选择 */
        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .role-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid #E8E0DA;
            color: var(--text-muted);
            transition: var(--transition);
            user-select: none;
            background: white;
        }

        .role-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .role-chip.active {
            border-color: var(--primary);
            background: rgba(224, 122, 95, 0.08);
            color: var(--primary);
            font-weight: 700;
        }

        .role-chip .role-desc {
            font-size: 11px;
            display: block;
            margin-top: 1px;
            opacity: 0.7;
        }

        /* 输入框样式 */
        .el-form-item {
            margin-bottom: 18px;
        }

        .el-input__inner {
            border-radius: 10px !important;
            height: 44px !important;
            font-size: 14px !important;
            border: 1.5px solid #E8E0DA !important;
            transition: var(--transition) !important;
            font-family: inherit !important;
        }

        .el-input__inner:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.12) !important;
        }

        .el-input__prefix .el-input__icon {
            font-size: 16px;
            line-height: 44px;
        }

        .pwd-toggle {
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .pwd-toggle:hover { opacity: 1; }

        /* 密码强度 */
        .pwd-strength {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            margin-bottom: 4px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: #E8E0DA;
            transition: background 0.3s;
        }

        .strength-bar.weak { background: #f56c6c; }
        .strength-bar.medium { background: var(--amber); }
        .strength-bar.strong { background: var(--sage); }

        .strength-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 错误提示 */
        .error-tip {
            font-size: 13px;
            color: var(--primary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 注册按钮 */
        .register-btn {
            width: 100%;
            height: 48px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            letter-spacing: 4px;
            transition: var(--transition);
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(224, 122, 95, 0.3);
            margin-top: 8px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 122, 95, 0.4);
        }

        .register-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
        }

        .register-btn.is-loading {
            opacity: 0.85;
            transform: none;
        }

        /* 协议 */
        .agreement-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 4px;
        }

        .agreement-row .el-checkbox__label {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 底部 */
        .footer-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #app { flex-direction: column; }

            .left-panel {
                flex: none;
                padding: 36px 24px 24px;
                min-height: 220px;
            }

            .left-icon { font-size: 56px; margin-bottom: 12px; }
            .left-title { font-size: 22px; }
            .left-desc { font-size: 13px; margin-bottom: 16px; }
            .floating-animals { display: none; }

            .right-panel {
                width: 100%;
                padding: 32px 24px 40px;
            }

            .form-header { margin-bottom: 24px; }
            .form-header h2 { font-size: 22px; }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, #FDF6F0 0%, #FAEEE7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
        }

        .loading-paw {
            font-size: 56px;
            animation: pawBounce 0.8s infinite;
            display: inline-block;
        }

        @keyframes pawBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .loading-text {
            margin-top: 12px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* 成功弹窗 */
        .success-icon {
            text-align: center;
            padding: 20px 0;
        }

        .success-icon .icon {
            font-size: 64px;
            display: inline-block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-icon h3 {
            font-size: 20px;
            color: var(--text-dark);
            margin: 16px 0 8px;
        }

        .success-icon p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        .success-icon .goto-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
        }

        .success-icon .goto-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(224, 122, 95, 0.4);
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-paw">🐾</div>
            <div class="loading-text">正在加载...</div>
        </div>
    </div>

    <div id="app">
    <!-- 左侧装饰区 -->
    <div class="left-panel">
        <div class="paw-bg">
            <svg style="top:5%;left:8%;width:60px;opacity:0.08" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="top:15%;right:12%;width:48px;opacity:0.06;transform:rotate(25deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="bottom:20%;left:15%;width:72px;opacity:0.05;transform:rotate(-15deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="bottom:10%;right:8%;width:56px;opacity:0.07;transform:rotate(10deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="top:40%;left:3%;width:40px;opacity:0.05;transform:rotate(-30deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="top:70%;left:25%;width:44px;opacity:0.06;transform:rotate(20deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>

        <div class="left-content">
            <div class="left-icon">🐾</div>
            <h1 class="left-title">加入<span>爱心</span><br>救助大家庭</h1>
            <p class="left-desc">免费注册，帮助流浪宠物<br>找到温暖的归宿</p>
            <div class="feature-tags">
                <div class="feature-tag">
                    <span class="tag-dot red"></span> 免费注册
                </div>
                <div class="feature-tag">
                    <span class="tag-dot green"></span> 实名保障
                </div>
                <div class="feature-tag">
                    <span class="tag-dot amber"></span> 爱心领养
                </div>
            </div>
        </div>

        <div class="floating-animals">
            <span class="floating-animal">🐶</span>
            <span class="floating-animal">🐱</span>
            <span class="floating-animal">🐰</span>
        </div>
    </div>

    <!-- 右侧注册表单 -->
    <div class="right-panel">
        <div class="form-header">
            <h2>创建账号</h2>
            <p>已有账号？<a class="login-link" href="login.html">立即登录</a></p>
        </div>

        <!-- 角色快速选择 -->
        <div class="role-selector" id="roleSelector">
            <div class="role-chip" data-role="adopter" onclick="selectRole(this)">
                领养人
                <span class="role-desc">申请领养宠物</span>
            </div>
            <div class="role-chip" data-role="volunteer" onclick="selectRole(this)">
                志愿者
                <span class="role-desc">协助救助</span>
            </div>
        </div>

        <el-form :model="registerForm" :rules="registerRules" ref="registerFormRef" :show-message="true" @submit.native.prevent>
            <el-form-item prop="name">
                <el-input
                    v-model="registerForm.name"
                    placeholder="请输入真实姓名"
                    clearable
                    maxlength="20">
                    <template #prefix><span style="font-size:16px">👤</span></template>
                </el-input>
            </el-form-item>

            <el-form-item prop="phone">
                <el-input
                    v-model="registerForm.phone"
                    placeholder="请输入手机号"
                    clearable
                    maxlength="11"
                    @input="onPhoneInput">
                    <template #prefix><span style="font-size:16px">📱</span></template>
                </el-input>
            </el-form-item>

            <el-form-item prop="password">
                <el-input
                    v-model="registerForm.password"
                    :type="showPassword ? 'text' : 'password'"
                    placeholder="设置密码（至少6位）"
                    @input="calcPwdStrength">
                    <template #prefix><span style="font-size:16px">🔒</span></template>
                    <template #suffix>
                        <span class="pwd-toggle" @click="showPassword = !showPassword">
                            {{ showPassword ? '🙈' : '👁️' }}
                        </span>
                    </template>
                </el-input>
                <!-- 密码强度指示 -->
                <div class="pwd-strength" v-if="registerForm.password.length > 0">
                    <div class="strength-bar" :class="pwdStrengthClass[0]"></div>
                    <div class="strength-bar" :class="pwdStrengthClass[1]"></div>
                    <div class="strength-bar" :class="pwdStrengthClass[2]"></div>
                </div>
                <div class="strength-text" v-if="registerForm.password.length > 0">
                    {{ pwdStrengthText }}
                </div>
            </el-form-item>

            <el-form-item prop="confirmPassword">
                <el-input
                    v-model="registerForm.confirmPassword"
                    :type="showConfirm ? 'text' : 'password'"
                    placeholder="请再次输入密码"
                    @input="onConfirmInput">
                    <template #prefix><span style="font-size:16px">🔒</span></template>
                    <template #suffix>
                        <span class="pwd-toggle" @click="showConfirm = !showConfirm">
                            {{ showConfirm ? '🙈' : '👁️' }}
                        </span>
                    </template>
                </el-input>
            </el-form-item>

            <div v-if="errorMsg" class="error-tip">
                <span>⚠️</span> {{ errorMsg }}
            </div>

            <el-form-item style="margin-bottom: 12px; margin-top: 8px;">
                <el-checkbox v-model="registerForm.agreed">
                    我已阅读并同意<a href="#" style="color: var(--primary); text-decoration: none;" @click.prevent>《用户服务协议》</a>
                    和<a href="#" style="color: var(--primary); text-decoration: none;" @click.prevent>《隐私政策》</a>
                </el-checkbox>
            </el-form-item>

            <el-form-item style="margin-bottom: 0;">
                <el-button
                    type="primary"
                    class="register-btn"
                    :class="{'is-loading': loading}"
                    :loading="loading"
                    @click="handleRegister"
                    :disabled="loading || !registerForm.agreed">
                    {{ loading ? '注 册 中...' : '注 册' }}
                </el-button>
            </el-form-item>
        </el-form>

        <div class="footer-hint">
            © 2026 上海大学 · 宠物救助收养系统
        </div>
    </div>

    <!-- 注册成功弹窗（独立于表单，放在#app内） -->
    <el-dialog
        :visible.sync="showSuccessDialog"
        width="400px"
        :close-on-click-modal="false"
        :show-close="false"
        center>
        <div class="success-icon">
            <div class="icon">🎉</div>
            <h3>注册成功！</h3>
            <p>欢迎加入宠物救助大家庭</p>
            <a class="goto-btn" href="pet-list.html">开始使用 →</a>
        </div>
    </el-dialog>
    </div><!-- end #app -->

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@0.27.2/dist/axios.min.js"></script>
    <script>
        Vue.use(ELEMENT);

        window.addEventListener('load', () => {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.classList.add('hidden');
            }, 600);
        });

        function selectRole(el) {
            document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            vm.registerForm.role = el.dataset.role;
        }

        const vm = new Vue({
            el: '#app',
            data: {
                registerForm: {
                    name: '',
                    phone: '',
                    password: '',
                    confirmPassword: '',
                    role: 'adopter',
                    agreed: false
                },
                registerRules: {
                    name: [
                        { required: true, message: '请输入真实姓名', trigger: 'blur' },
                        { min: 2, max: 20, message: '姓名长度在 2 到 20 个字符', trigger: 'blur' }
                    ],
                    phone: [
                        { required: true, message: '请输入手机号', trigger: 'blur' },
                        { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号格式', trigger: 'blur' }
                    ],
                    password: [
                        { required: true, message: '请设置密码', trigger: 'blur' },
                        { min: 6, message: '密码至少6位', trigger: 'blur' }
                    ],
                    confirmPassword: [
                        { required: true, message: '请再次输入密码', trigger: 'blur' }
                    ]
                },
                loading: false,
                showPassword: false,
                showConfirm: false,
                errorMsg: '',
                showSuccessDialog: false,
                pwdStrengthText: '',
                pwdStrengthClass: ['', '', '']
            },
            mounted() {
                // 默认选中领养人
                this.$nextTick(() => {
                    const defaultRole = document.querySelector('[data-role="adopter"]');
                    if (defaultRole) {
                        defaultRole.classList.add('active');
                        this.registerForm.role = 'adopter';
                    }
                });
                setTimeout(() => {
                    const overlay = document.getElementById('loadingOverlay');
                    if (overlay) overlay.classList.add('hidden');
                }, 400);
            },
            methods: {
                onPhoneInput() { this.errorMsg = ''; },
                onConfirmInput() { this.errorMsg = ''; },
                calcPwdStrength() {
                    const pwd = this.registerForm.password;
                    let score = 0;
                    if (pwd.length >= 6) score++;
                    if (pwd.length >= 8 && /[A-Za-z]/.test(pwd) && /[0-9]/.test(pwd)) score++;
                    if (/[^A-Za-z0-9]/.test(pwd) && pwd.length >= 10) score++;

                    const levels = [
                        ['', '', ''],
                        ['weak', '', ''],
                        ['weak', 'medium', ''],
                        ['weak', 'medium', 'strong']
                    ];
                    this.pwdStrengthClass = levels[Math.min(score, 3)];
                    const texts = ['', '密码强度：弱', '密码强度：一般', '密码强度：强'];
                    this.pwdStrengthText = texts[Math.min(score, 3)];
                },
                handleRegister() {
                    this.errorMsg = '';
                    this.$refs.registerFormRef.validate(async (valid) => {
                        if (!valid) {
                            this.errorMsg = '请检查输入格式';
                            return;
                        }
                        if (!this.registerForm.agreed) {
                            this.errorMsg = '请先阅读并同意用户协议';
                            return;
                        }
                        if (this.registerForm.password !== this.registerForm.confirmPassword) {
                            this.errorMsg = '两次输入的密码不一致';
                            return;
                        }
                        this.loading = true;
                        try {
                            const response = await axios.post('/api/auth/register', {
                                name: this.registerForm.name,
                                phone: this.registerForm.phone,
                                password: this.registerForm.password,
                                confirmPassword: this.registerForm.confirmPassword,
                                role: this.registerForm.role
                            });
                            if (response.data.code === 200) {
                                // 保存Token和用户信息
                                localStorage.setItem('token', response.data.data.token);
                                localStorage.setItem('user', JSON.stringify(response.data.data.user));
                                // 显示成功弹窗
                                this.showSuccessDialog = true;
                            } else {
                                this.errorMsg = response.data.message || '注册失败，请重试';
                            }
                        } catch (error) {
                            if (error.response && error.response.data) {
                                this.errorMsg = error.response.data.message || '注册失败';
                            } else {
                                this.errorMsg = '网络错误，请检查网络连接后重试';
                            }
                        } finally {
                            this.loading = false;
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
