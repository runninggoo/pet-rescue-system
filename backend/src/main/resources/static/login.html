<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 宠物救助收养系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E07A5F;
            --primary-dark: #c96a50;
            --primary-light: #f0a28a;
            --sage: #81B29A;
            --sage-light: #a8cdb8;
            --amber: #F4A261;
            --warm-white: #FDF6F0;
            --warm-cream: #FAEEE7;
            --text-dark: #3D405B;
            --text-muted: #8A8EA0;
            --card-shadow: 0 8px 32px rgba(224, 122, 95, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            display: flex;
            width: 100%;
        }

        /* ========== 左侧装饰区 ========== */
        .left-panel {
            flex: 1;
            background: linear-gradient(160deg, #FDF6F0 0%, #FAEEE7 40%, #E8D5C4 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .paw-bg {
            position: absolute;
            inset: 0;
            opacity: 0.06;
            pointer-events: none;
        }

        .paw-bg svg {
            position: absolute;
            fill: #E07A5F;
        }

        .left-content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeSlideUp 0.8s ease both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left-icon {
            font-size: 88px;
            margin-bottom: 20px;
            display: inline-block;
            animation: gentleBounce 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(224, 122, 95, 0.3));
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        .left-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0 0 8px;
            letter-spacing: -0.5px;
        }

        .left-title span {
            color: var(--primary);
        }

        .left-desc {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .feature-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: fadeSlideUp 0.8s ease both;
        }

        .feature-tag:nth-child(1) { animation-delay: 0.1s; }
        .feature-tag:nth-child(2) { animation-delay: 0.2s; }
        .feature-tag:nth-child(3) { animation-delay: 0.3s; }

        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tag-dot.red { background: var(--primary); }
        .tag-dot.green { background: var(--sage); }
        .tag-dot.amber { background: var(--amber); }

        /* 漂浮动物图标 */
        .floating-animals {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 24px;
            opacity: 0.4;
        }

        .floating-animal {
            font-size: 28px;
            animation: floatAnimal 4s ease-in-out infinite;
        }

        .floating-animal:nth-child(2) { animation-delay: 1s; }
        .floating-animal:nth-child(3) { animation-delay: 2s; }

        @keyframes floatAnimal {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ========== 右侧表单区 ========== */
        .right-panel {
            width: 460px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 52px;
            animation: fadeSlideUp 0.8s ease 0.15s both;
        }

        .form-header {
            margin-bottom: 36px;
        }

        .form-header h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0 0 6px;
        }

        .form-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        /* 角色选择 */
        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .role-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid #E8E0DA;
            color: var(--text-muted);
            transition: var(--transition);
            user-select: none;
            background: white;
        }

        .role-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .role-chip.active {
            border-color: var(--primary);
            background: rgba(224, 122, 95, 0.08);
            color: var(--primary);
            font-weight: 700;
        }

        .role-chip .role-desc {
            font-size: 11px;
            display: block;
            margin-top: 1px;
            opacity: 0.7;
        }

        /* 输入框样式 */
        .el-form-item {
            margin-bottom: 20px;
        }

        .el-input__inner {
            border-radius: 10px !important;
            height: 46px !important;
            font-size: 15px !important;
            border: 1.5px solid #E8E0DA !important;
            transition: var(--transition) !important;
            font-family: inherit !important;
        }

        .el-input__inner:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.12) !important;
        }

        .el-input__prefix .el-input__icon {
            font-size: 16px;
            line-height: 46px;
        }

        /* 密码切换 */
        .pwd-toggle {
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .pwd-toggle:hover { opacity: 1; }

        /* 错误提示 */
        .error-tip {
            font-size: 13px;
            color: var(--primary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            height: 48px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            letter-spacing: 4px;
            transition: var(--transition);
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(224, 122, 95, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 122, 95, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
        }

        .login-btn.is-loading {
            opacity: 0.85;
            transform: none;
        }

        /* 快速填充 */
        .quick-fill {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #F0EBE7;
        }

        .quick-fill-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .quick-accounts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-account {
            padding: 5px 12px;
            background: var(--warm-cream);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-dark);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .quick-account:hover {
            background: rgba(224, 122, 95, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 底部 */
        .footer-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #app { flex-direction: column; }

            .left-panel {
                flex: none;
                padding: 36px 24px 24px;
                min-height: 220px;
            }

            .left-icon { font-size: 56px; margin-bottom: 12px; }
            .left-title { font-size: 22px; }
            .left-desc { font-size: 13px; margin-bottom: 16px; }
            .floating-animals { display: none; }

            .right-panel {
                width: 100%;
                padding: 32px 24px 40px;
            }

            .form-header { margin-bottom: 24px; }
            .form-header h2 { font-size: 22px; }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, #FDF6F0 0%, #FAEEE7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
        }

        .loading-paw {
            font-size: 56px;
            animation: pawBounce 0.8s infinite;
            display: inline-block;
        }

        @keyframes pawBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .loading-text {
            margin-top: 12px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- 加载动画（独立于 Vue，不影响挂载） -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-paw">🐾</div>
            <div class="loading-text">正在加载...</div>
        </div>
    </div>

    <div id="app">
    <!-- 左侧装饰区 -->
    <div class="left-panel">
        <!-- 爪印背景 -->
        <div class="paw-bg">
            <svg style="top:5%;left:8%;width:60px;opacity:0.08" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="top:15%;right:12%;width:48px;opacity:0.06;transform:rotate(25deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="bottom:20%;left:15%;width:72px;opacity:0.05;transform:rotate(-15deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="bottom:10%;right:8%;width:56px;opacity:0.07;transform:rotate(10deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="top:40%;left:3%;width:40px;opacity:0.05;transform:rotate(-30deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg style="top:70%;left:25%;width:44px;opacity:0.06;transform:rotate(20deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>

        <div class="left-content">
            <div class="left-icon">🐾</div>
            <h1 class="left-title">每一只<span>小生命</span><br>都值得被爱</h1>
            <p class="left-desc">在这里，为流浪的TA们<br>找到一个温暖的家</p>
            <div class="feature-tags">
                <div class="feature-tag">
                    <span class="tag-dot red"></span> 救助发现
                </div>
                <div class="feature-tag">
                    <span class="tag-dot green"></span> 健康守护
                </div>
                <div class="feature-tag">
                    <span class="tag-dot amber"></span> 温暖领养
                </div>
            </div>
        </div>

        <div class="floating-animals">
            <span class="floating-animal">🐶</span>
            <span class="floating-animal">🐱</span>
            <span class="floating-animal">🐰</span>
        </div>
    </div>

    <!-- 右侧登录表单 -->
    <div class="right-panel">
        <div class="form-header">
            <h2>欢迎回来</h2>
            <p>登录账号，开始您的爱心之旅</p>
        </div>

        <!-- 角色快速选择 -->
        <div class="role-selector" id="roleSelector">
            <div class="role-chip active" data-role="admin" onclick="selectRole(this)">
                管理员
                <span class="role-desc">全部权限</span>
            </div>
            <div class="role-chip" data-role="adopter" onclick="selectRole(this)">
                领养人
                <span class="role-desc">申请领养</span>
            </div>
            <div class="role-chip" data-role="institution_admin" onclick="selectRole(this)">
                机构管理员
                <span class="role-desc">管理救助站</span>
            </div>
            <div class="role-chip" data-role="volunteer" onclick="selectRole(this)">
                志愿者
                <span class="role-desc">协助救助</span>
            </div>
        </div>

        <el-form :model="loginForm" :rules="loginRules" ref="loginFormRef" :show-message="true" @submit.native.prevent>
            <el-form-item prop="phone">
                <el-input
                    v-model="loginForm.phone"
                    placeholder="请输入手机号"
                    clearable
                    maxlength="11"
                    @input="onPhoneInput"
                    @blur="validatePhone">
                    <template #prefix><span style="font-size:16px">📱</span></template>
                </el-input>
            </el-form-item>

            <el-form-item prop="password">
                <el-input
                    v-model="loginForm.password"
                    :type="showPassword ? 'text' : 'password'"
                    placeholder="请输入密码"
                    @keyup.enter.native="handleLogin">
                    <template #prefix><span style="font-size:16px">🔒</span></template>
                    <template #suffix>
                        <span class="pwd-toggle" @click="showPassword = !showPassword">
                            {{ showPassword ? '🙈' : '👁️' }}
                        </span>
                    </template>
                </el-input>
            </el-form-item>

            <div v-if="errorMsg" class="error-tip">
                <span>⚠️</span> {{ errorMsg }}
            </div>

            <el-form-item style="margin-bottom: 0; margin-top: 12px;">
                <el-button
                    type="primary"
                    class="login-btn"
                    :class="{'is-loading': loading}"
                    :loading="loading"
                    @click="handleLogin"
                    :disabled="loading">
                    {{ loading ? '登 录 中...' : '登 录' }}
                </el-button>
            </el-form-item>
        </el-form>

        <!-- 快速填充 -->
        <div class="quick-fill">
            <div class="quick-fill-label">快速填充测试账号（密码均为 123456）</div>
            <div class="quick-accounts">
                <span class="quick-account" onclick="fillAccount('13800000000','123456')">管理员</span>
                <span class="quick-account" onclick="fillAccount('13900000001','123456')">领养人</span>
                <span class="quick-account" onclick="fillAccount('13700000001','123456')">机构管理员</span>
                <span class="quick-account" onclick="fillAccount('13600000001','password')">志愿者</span>
            </div>
        </div>

        <!-- 注册引导 -->
        <div style="margin-top: 20px; text-align: center;">
            <span style="font-size: 13px; color: var(--text-muted);">
                还没有账号？
                <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">立即注册 →</a>
            </span>
        </div>

        <div class="footer-hint">
            © 2026 上海大学 · 宠物救助收养系统
        </div>
    </div>
    </div><!-- end #app -->

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@0.27.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        Vue.use(ELEMENT);

        window.addEventListener('load', () => {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.classList.add('hidden');
            }, 600);
        });

        function selectRole(el) {
            document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const role = el.dataset.role;
            const accounts = {
                admin: ['13800000000', '123456'],
                adopter: ['13900000001', '123456'],
                institution_admin: ['13700000001', '123456'],
                volunteer: ['13600000001', 'password']
            };
            if (accounts[role]) {
                vm.loginForm.phone = accounts[role][0];
                vm.loginForm.password = accounts[role][1];
            }
        }

        function fillAccount(phone, password) {
            vm.loginForm.phone = phone;
            vm.loginForm.password = password;
            vm.errorMsg = '';
        }

        const vm = new Vue({
            el: '#app',
            data: {
                loginForm: { phone: '', password: '' },
                loginRules: {
                    phone: [
                        { required: true, message: '请输入手机号', trigger: 'blur' },
                        { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号格式', trigger: 'blur' }
                    ],
                    password: [
                        { required: true, message: '请输入密码', trigger: 'blur' },
                        { min: 6, message: '密码至少6位', trigger: 'blur' }
                    ]
                },
                loading: false,
                showPassword: false,
                errorMsg: ''
            },
            mounted() {
                setTimeout(() => {
                    const overlay = document.getElementById('loadingOverlay');
                    if (overlay) overlay.classList.add('hidden');
                }, 400);
            },
            methods: {
                onPhoneInput() { this.errorMsg = ''; },
                validatePhone() {
                    const phone = this.loginForm.phone;
                    if (!phone) return;
                    if (!/^1[3-9]\d{9}$/.test(phone)) {
                        this.$message.warning('请输入正确的手机号');
                    }
                },
                handleLogin() {
                    this.errorMsg = '';
                    this.$refs.loginFormRef.validate(async (valid) => {
                        if (!valid) { this.errorMsg = '请检查输入格式'; return; }
                        this.loading = true;
                        try {
                            const response = await axios.post('/api/auth/login', {
                                phone: this.loginForm.phone,
                                password: this.loginForm.password
                            });
                            if (response.data.code === 200) {
                                const { token, refreshToken, user } = response.data.data;
                                saveAuth(token, refreshToken, user);
                                this.$message.success('登录成功！正在跳转...');
                                setTimeout(() => { window.location.href = 'pet-list.html'; }, 800);
                            } else {
                                this.errorMsg = response.data.message || '手机号或密码错误';
                            }
                        } catch (error) {
                            this.errorMsg = '网络错误，请检查网络连接后重试';
                        } finally {
                            this.loading = false;
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
