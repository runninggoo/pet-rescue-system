<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物救助收养系统 - 用户管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-table {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        .operation-buttons {
            margin-bottom: 20px;
        }
        .el-button {
            margin: 0 5px;
        }
        .user-form {
            max-width: 600px;
            margin: 0 auto;
        }
        .role-select {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="header">
            <h2>👥 用户管理</h2>
            <div>
                <el-input v-model="searchKeyword" placeholder="搜索用户名/手机号" style="width: 250px;" @keyup.enter.native="handleSearch"></el-input>
                <el-button type="primary" @click="handleSearch" style="margin-left: 10px;">搜索</el-button>
                <el-button @click="handleReset">重置</el-button>
            </div>
        </div>

        <div class="user-table">
            <div class="operation-buttons">
                <el-button type="primary" icon="el-icon-plus" @click="handleAdd">添加用户</el-button>
                <el-button type="warning" icon="el-icon-download" @click="handleExport">导出</el-button>
            </div>

            <el-table :data="users" v-loading="loading" style="width: 100%" border>
                <el-table-column prop="id" label="ID" width="60"></el-table-column>
                <el-table-column prop="name" label="姓名" width="120"></el-table-column>
                <el-table-column prop="phone" label="手机号" width="130"></el-table-column>
                <el-table-column prop="role" label="角色" width="120">
                    <template slot-scope="scope">
                        <el-tag :type="getRoleType(scope.row.role)" size="small">
                            {{ getRoleName(scope.row.role) }}
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="status" label="状态" width="80">
                    <template slot-scope="scope">
                        <el-tag :type="scope.row.status === 1 ? 'success' : 'danger'" size="small">
                            {{ scope.row.status === 1 ? '正常' : '禁用' }}
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="createdTime" label="注册时间" width="160"></el-table-column>
                <el-table-column label="操作" width="200" fixed="right">
                    <template slot-scope="scope">
                        <el-button size="mini" @click="handleEdit(scope.row)">编辑</el-button>
                        <el-button size="mini" type="danger" @click="handleDelete(scope.row)">删除</el-button>
                        <el-button size="mini" :type="scope.row.status === 1 ? 'warning' : 'success'" @click="handleToggleStatus(scope.row)">
                            {{ scope.row.status === 1 ? '禁用' : '启用' }}
                        </el-button>
                    </template>
                </el-table-column>
            </el-table>

            <el-pagination
                @current-change="handlePageChange"
                :current-page="currentPage"
                :page-size="pageSize"
                layout="total, prev, pager, next"
                :total="total"
                style="margin-top: 20px; text-align: center;">
            </el-pagination>
        </div>

        <!-- 用户编辑/添加对话框 -->
        <el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="500px" @close="handleDialogClose">
            <el-form :model="userForm" :rules="rules" ref="userForm" class="user-form">
                <el-form-item label="姓名" prop="name" label-width="80px">
                    <el-input v-model="userForm.name" placeholder="请输入姓名"></el-input>
                </el-form-item>

                <el-form-item label="手机号" prop="phone" label-width="80px">
                    <el-input v-model="userForm.phone" placeholder="请输入手机号" :disabled="isEditMode"></el-input>
                </el-form-item>

                <el-form-item label="角色" prop="role" label-width="80px">
                    <el-select v-model="userForm.role" class="role-select" placeholder="请选择角色">
                        <el-option label="领养人" value="adopter"></el-option>
                        <el-option label="救助机构管理员" value="institution_admin"></el-option>
                        <el-option label="志愿者" value="volunteer"></el-option>
                        <el-option label="宠物医院" value="hospital"></el-option>
                        <el-option label="系统管理员" value="admin"></el-option>
                    </el-select>
                </el-form-item>

                <el-form-item label="状态" prop="status" label-width="80px">
                    <el-radio-group v-model="userForm.status">
                        <el-radio :label="1">正常</el-radio>
                        <el-radio :label="0">禁用</el-radio>
                    </el-radio-group>
                </el-form-item>

                <el-form-item v-if="userForm.role === 'adopter'" label="身份证号" prop="adopterIdCard" label-width="80px">
                    <el-input v-model="userForm.adopterIdCard" placeholder="请输入身份证号"></el-input>
                </el-form-item>

                <el-form-item v-if="userForm.role === 'adopter'" label="家庭地址" prop="adopterAddress" label-width="80px">
                    <el-input v-model="userForm.adopterAddress" placeholder="请输入家庭地址"></el-input>
                </el-form-item>

                <el-form-item v-if="userForm.role === 'institution_admin'" label="机构名称" prop="institutionName" label-width="80px">
                    <el-input v-model="userForm.institutionName" placeholder="请输入机构名称"></el-input>
                </el-form-item>

                <el-form-item v-if="userForm.role === 'volunteer'" label="服务区域" prop="volunteerServiceArea" label-width="80px">
                    <el-input v-model="userForm.volunteerServiceArea" placeholder="请输入服务区域"></el-input>
                </el-form-item>

                <el-form-item v-if="userForm.role === 'hospital'" label="医院名称" prop="hospitalName" label-width="80px">
                    <el-input v-model="userForm.hospitalName" placeholder="请输入医院名称"></el-input>
                </el-form-item>

                <el-form-item v-if="!isEditMode" label="密码" prop="password" label-width="80px">
                    <el-input v-model="userForm.password" type="password" placeholder="请输入密码"></el-input>
                </el-form-item>
            </el-form>
            <div slot="footer" class="dialog-footer">
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="submitForm" :loading="submitting">确定</el-button>
            </div>
        </el-dialog>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios@0.27.2/dist/axios.min.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                users: [],
                loading: false,
                searchKeyword: '',
                currentPage: 1,
                pageSize: 10,
                total: 0,
                dialogVisible: false,
                dialogTitle: '添加用户',
                isEditMode: false,
                submitting: false,
                userForm: {
                    id: null,
                    name: '',
                    phone: '',
                    role: 'adopter',
                    status: 1,
                    password: '',
                    adopterIdCard: '',
                    adopterAddress: '',
                    institutionName: '',
                    volunteerServiceArea: '',
                    hospitalName: ''
                },
                rules: {
                    name: [{ required: true, message: '请输入姓名', trigger: 'blur' }],
                    phone: [
                        { required: true, message: '请输入手机号', trigger: 'blur' },
                        { pattern: /^1[3-9]\d{9}$/, message: '手机号格式不正确', trigger: 'blur' }
                    ],
                    role: [{ required: true, message: '请选择角色', trigger: 'change' }],
                    status: [{ required: true, message: '请选择状态', trigger: 'change' }],
                    password: [
                        { required: true, message: '请输入密码', trigger: 'blur' },
                        { min: 6, message: '密码长度不能少于6位', trigger: 'blur' }
                    ]
                }
            },
            mounted() {
                this.loadUsers();
            },
            methods: {
                loadUsers() {
                    this.loading = true;
                    const params = {
                        page: this.currentPage,
                        pageSize: this.pageSize,
                        keyword: this.searchKeyword
                    };
                    axios.get('/api/user/list', { params: params })
                        .then(response => {
                            this.loading = false;
                            const data = response.data;
                            if (data.code === 200) {
                                this.users = data.data.users;
                                this.total = data.data.total || this.users.length;
                            } else {
                                this.$message.error(data.message);
                            }
                        })
                        .catch(error => {
                            this.loading = false;
                            this.$message.error('加载用户列表失败：' + error.message);
                        });
                },
                handleSearch() {
                    this.currentPage = 1;
                    this.loadUsers();
                },
                handleReset() {
                    this.searchKeyword = '';
                    this.currentPage = 1;
                    this.loadUsers();
                },
                handlePageChange(page) {
                    this.currentPage = page;
                    this.loadUsers();
                },
                handleAdd() {
                    this.dialogTitle = '添加用户';
                    this.isEditMode = false;
                    this.userForm = {
                        id: null,
                        name: '',
                        phone: '',
                        role: 'adopter',
                        status: 1,
                        password: '',
                        adopterIdCard: '',
                        adopterAddress: '',
                        institutionName: '',
                        volunteerServiceArea: '',
                        hospitalName: ''
                    };
                    this.dialogVisible = true;
                },
                handleEdit(user) {
                    this.dialogTitle = '编辑用户';
                    this.isEditMode = true;
                    this.userForm = {
                        id: user.id,
                        name: user.name,
                        phone: user.phone,
                        role: user.role,
                        status: user.status,
                        adopterIdCard: user.adopterIdCard || '',
                        adopterAddress: user.adopterAddress || '',
                        institutionName: user.institutionName || '',
                        volunteerServiceArea: user.volunteerServiceArea || '',
                        hospitalName: user.hospitalName || ''
                    };
                    this.dialogVisible = true;
                },
                handleDelete(user) {
                    this.$confirm('确认删除用户 ' + user.name + ' 吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(() => {
                        axios.delete('/api/user/delete/' + user.id)
                            .then(response => {
                                const data = response.data;
                                if (data.code === 200) {
                                    this.$message.success('删除成功');
                                    this.loadUsers();
                                } else {
                                    this.$message.error(data.message);
                                }
                            })
                            .catch(error => {
                                this.$message.error('删除失败：' + error.message);
                            });
                    }).catch(() => {});
                },
                handleToggleStatus(user) {
                    const newStatus = user.status === 1 ? 0 : 1;
                    const action = newStatus === 1 ? '启用' : '禁用';
                    axios.put('/api/user/status/' + user.id, { status: newStatus })
                        .then(response => {
                            const data = response.data;
                            if (data.code === 200) {
                                this.$message.success(action + '成功');
                                user.status = newStatus;
                            } else {
                                this.$message.error(data.message);
                            }
                        })
                        .catch(error => {
                            this.$message.error(action + '失败：' + error.message);
                        });
                },
                handleExport() {
                    this.$message.info('导出功能开发中...');
                },
                submitForm() {
                    this.$refs.userForm.validate(valid => {
                        if (valid) {
                            this.submitting = true;
                            const url = this.isEditMode ? '/api/user/update' : '/api/user/add';
                            const method = this.isEditMode ? 'put' : 'post';

                            axios[method](url, this.userForm)
                                .then(response => {
                                    this.submitting = false;
                                    const data = response.data;
                                    if (data.code === 200) {
                                        this.$message.success(this.isEditMode ? '编辑成功' : '添加成功');
                                        this.dialogVisible = false;
                                        this.loadUsers();
                                    } else {
                                        this.$message.error(data.message);
                                    }
                                })
                                .catch(error => {
                                    this.submitting = false;
                                    this.$message.error('操作失败：' + error.message);
                                });
                        }
                    });
                },
                handleDialogClose() {
                    this.$refs.userForm.clearValidate();
                },
                getRoleType(role) {
                    const types = {
                        'adopter': 'success',
                        'institution_admin': 'primary',
                        'volunteer': 'warning',
                        'hospital': 'info',
                        'admin': 'danger'
                    };
                    return types[role] || 'info';
                },
                getRoleName(role) {
                    const names = {
                        'adopter': '领养人',
                        'institution_admin': '机构管理员',
                        'volunteer': '志愿者',
                        'hospital': '宠物医院',
                        'admin': '系统管理员'
                    };
                    return names[role] || role;
                }
            }
        });
    </script>
</body>
</html>
