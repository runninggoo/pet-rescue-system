<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 宠物救助收养系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.13/lib/theme-chalk/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E07A5F;
            --primary-dark: #c96a50;
            --primary-light: #f0a28a;
            --primary-bg: rgba(224, 122, 95, 0.08);
            --sage: #81B29A;
            --sage-light: #a8cdb8;
            --amber: #F4A261;
            --sky: #87CEEB;
            --sky-light: #B0E2FF;
            --sky-bg: rgba(135, 206, 235, 0.12);
            --lavender: #B8A9C9;
            --lavender-light: #D8CCE8;
            --lavender-bg: rgba(184, 169, 201, 0.12);
            --mint: #98D8C8;
            --mint-light: #B8EBE0;
            --mint-bg: rgba(152, 216, 200, 0.12);
            --success: #52c788;
            --danger: #e05d5d;
            --info: #5b8dee;
            --warm-white: #FDF6F0;
            --warm-cream: #FAEEE7;
            --warm-gray: #f0ebe7;
            --warm-gray2: #ede6df;
            --text-dark: #3D405B;
            --text-muted: #8A8EA0;
            --bg: var(--warm-white);
            --card-shadow: 0 4px 20px rgba(224, 122, 95, 0.1);
            --card-shadow-hover: 0 12px 40px rgba(224, 122, 95, 0.2);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 20px;
            --radius-sm: 12px;
            /* === P2-1 排版层级变量 === */
            --text-display: 800 26px/1.2 "Nunito","PingFang SC","Microsoft YaHei",sans-serif;
            --text-title: 700 17px/1.4 "Nunito","PingFang SC","Microsoft YaHei",sans-serif;
            --text-body: 400 14px/1.6 "Nunito","PingFang SC","Microsoft YaHei",sans-serif;
            --text-label: 600 12px/1.5 "Nunito","PingFang SC","Microsoft YaHei",sans-serif;
            --text-number: 800 34px/1 "Nunito","PingFang SC","Microsoft YaHei",sans-serif;
        }
        * { box-sizing: border-box; }
        *:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(160deg, var(--warm-white) 0%, var(--warm-cream) 60%, #f5e8df 100%);
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            color: var(--text-dark);
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--warm-gray); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Element UI 覆盖 */
        .el-button--primary { background-color: var(--primary) !important; border-color: var(--primary) !important; border-radius: var(--radius-sm) !important; }
        .el-button--primary:hover { background-color: var(--primary-dark) !important; border-color: var(--primary-dark) !important; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(224,122,95,0.3); }
        .el-button--success { background-color: var(--sage) !important; border-color: var(--sage) !important; border-radius: var(--radius-sm) !important; }
        .el-button--warning { background-color: var(--amber) !important; border-color: var(--amber) !important; border-radius: var(--radius-sm) !important; }
        .el-button { border-radius: var(--radius-sm) !important; transition: var(--transition) !important; }
        .el-input__inner:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(224,122,95,0.12) !important; }
        .el-date-editor .el-input__inner:focus { border-color: var(--primary) !important; }
        .el-pager li.active { background-color: var(--primary) !important; color: white !important; border-radius: 50% !important; }
        .el-pagination .el-pager li { border-radius: 50% !important; }
        .el-pagination .el-pager li:hover { color: var(--primary) !important; }
        .el-range-editor.el-input__inner { border-radius: var(--radius-sm) !important; }
        .el-range-editor .el-input__inner { border-radius: var(--radius-sm) !important; }
        .el-table th.el-table__cell { background: var(--warm-cream) !important; color: var(--text-dark); font-weight: 700; }
        .el-table td.el-table__cell { border-bottom-color: var(--warm-gray) !important; }
        .el-table--border td, .el-table--border th { border-color: var(--warm-gray) !important; }
        .el-table { border-radius: var(--radius) !important; overflow: hidden; }
        .el-table::before { display: none; }
        .el-table .el-table__row:hover > td { background-color: rgba(224,122,95,0.04) !important; }
        .el-table .cell { color: var(--text-dark); }

        /* 动画 */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes shimmerBg {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 页面布局 */
        .page-wrapper {
            min-height: 100vh;
            background: linear-gradient(180deg, var(--warm-white) 0%, var(--warm-cream) 100%);
            position: relative;
            overflow: hidden;
        }
        .page-bg-paws {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .page-bg-paws svg { position: absolute; fill: var(--primary); opacity: 0.04; }
        .page-content {
            position: relative; z-index: 1;
            max-width: 1600px; margin: 0 auto;
            padding: 24px 24px 40px;
        }

        /* 顶部横幅 */
        .hero-banner {
            background: white;
            border-radius: var(--radius);
            padding: 32px 36px;
            margin-bottom: 24px;
            box-shadow: var(--card-shadow);
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeSlideDown 0.5s ease;
            position: relative; overflow: hidden;
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--amber), var(--sage));
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(224,122,95,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .nav-link {
            padding: 6px 14px; border-radius: var(--radius-sm);
            text-decoration: none; color: var(--text-muted);
            font-size: 13px; font-weight: 600;
            transition: var(--transition); cursor: pointer;
        }
        .nav-link:hover { background: var(--warm-gray); color: var(--text-dark); }
        .nav-link.danger { color: var(--primary); }
        .nav-link.danger:hover { background: #fef0ee; color: var(--primary); }
        .hero-left { display: flex; align-items: center; gap: 20px; }
        .hero-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 24px rgba(224,122,95,0.3);
            flex-shrink: 0;
        }
        .hero-title-group h1 { margin: 0 0 4px; font-size: 26px; font-weight: 800; color: var(--text-dark); line-height: 1.2; }
        .hero-title-group h1 span { color: var(--primary); }
        .hero-title-group .title-icon { margin-right: 6px; }
        .hero-title-group p { margin: 0; font-size: 14px; color: var(--text-muted); font-weight: 400; }
        .hero-right { display: flex; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; }
        .hero-paw { font-size: 26px; animation: float 3s ease-in-out infinite; opacity: 0.3; }
        .hero-paw:nth-child(2) { animation-delay: 0.8s; opacity: 0.2; }
        .quick-actions { display: flex; align-items: center; gap: 12px; }
        .quick-actions a { color: var(--text-muted); text-decoration: none; transition: var(--transition); padding: 4px 0; font-weight: 600; }
        .quick-actions a:hover { color: var(--primary); }
        .quick-actions span { color: var(--warm-gray2); }
        .role-badge-hero {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
        }
        .role-badge-hero.admin { background: #fef0ee; color: var(--primary); }
        .role-badge-hero.institution_admin { background: #e3f2fd; color: #1565c0; }
        .role-badge-hero.volunteer { background: #fff8e1; color: #f57f17; }
        .role-badge-hero.adopter { background: #e8f5ee; color: #2e7d32; }

        /* 统计概览卡片 */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border: 1px solid rgba(224, 122, 95, 0.3);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: var(--transition);
            animation: cardEnter 0.5s ease both;
            position: relative; overflow: hidden;
        }
        .stat-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-4px); }
        .stat-card::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
        }
        .stat-card.total::before { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
        .stat-card.adopted::before { background: linear-gradient(90deg, var(--sage), var(--sage-light)); }
        .stat-card.rate::before { background: linear-gradient(90deg, var(--amber), #f5c48a); }
        .stat-card.followup::before { background: linear-gradient(90deg, #9C27B0, #673AB7); }
        .stat-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; margin: 0 auto 14px;
        }
        .stat-card.total .stat-icon { background: #fce8e2; }
        .stat-card.adopted .stat-icon { background: #e8f5ee; }
        .stat-card.rate .stat-icon { background: #fef3e8; }
        .stat-card.followup .stat-icon { background: #f3e5f5; }
        .stat-number { font-size: 34px; font-weight: 800; color: var(--text-dark); margin: 4px 0; transition: var(--transition); font-family: "Nunito","PingFang SC","Microsoft YaHei",sans-serif; line-height: 1; }
        .stat-card.total .stat-number { color: var(--primary); }
        .stat-card.adopted .stat-number { color: var(--sage); }
        .stat-card.rate .stat-number { color: var(--amber); }
        .stat-card.followup .stat-number { color: #9C27B0; }
        .stat-label { color: var(--text-muted); font-size: 14px; font-weight: 600; line-height: 1.5; }
        .stat-sub { font-size: 12px; color: #C0C4CC; margin-top: 4px; font-weight: 400; letter-spacing: 0.02em; }
        .stat-card:hover .stat-number { transform: scale(1.08); }

        /* 筛选卡片 */
        .filter-card {
            background: white;
            border-radius: var(--radius);
            padding: 16px 24px;
            margin-bottom: 24px;
            box-shadow: var(--card-shadow);
            animation: fadeSlideDown 0.5s ease 0.08s both;
        }
        .filter-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

        /* 数据表格卡片 */
        .data-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            animation: cardEnter 0.5s ease both;
            position: relative; overflow: hidden;
        }
        .data-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-2px); }
        .data-card::after {
            content: ''; position: absolute;
            top: -20px; right: -20px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(224,122,95,0.04) 0%, transparent 70%);
            border-radius: 50%;
            transition: var(--transition);
        }
        .data-card:hover::after { transform: scale(1.3); }
        .data-card-title {
            font-size: 17px; font-weight: 700; margin-bottom: 16px;
            color: var(--text-dark); display: flex; align-items: center; gap: 8px; line-height: 1.4;
        }
        .data-card-title .icon { font-size: 18px; }

        /* 渐变按钮 */
        .btn-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--primary) 100%) !important;
            background-size: 200% auto !important;
            border: none !important; color: white !important;
            font-weight: 700 !important; border-radius: var(--radius-sm) !important;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            box-shadow: 0 4px 16px rgba(224,122,95,0.3) !important;
        }
        .btn-gradient:hover {
            background-position: right center !important;
            box-shadow: 0 8px 28px rgba(224,122,95,0.45) !important;
            transform: translateY(-2px) !important;
        }

        /* 骨架屏 */
        .skeleton-line {
            border-radius: 6px;
            background: linear-gradient(90deg, var(--warm-gray) 25%, var(--warm-cream) 50%, var(--warm-gray) 75%);
            background-size: 200% 100%;
            animation: shimmerBg 1.5s infinite;
        }

        /* 网格布局 */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* ========== P2-2 响应式布局 ========== */
        /* 平板：横幅精简 + 双列统计 */
        @media (max-width: 900px) {
            .hero-banner { flex-direction: column; align-items: flex-start; gap: 16px; padding: 20px 24px; }
            .hero-right { margin-left: 0 !important; width: 100%; justify-content: flex-start; flex-wrap: wrap; gap: 6px; }
            .hero-paw { display: none; }
            .two-col { grid-template-columns: 1fr; }
            .stats-overview { grid-template-columns: repeat(2, 1fr); }
        }
        /* 移动端：横幅极简 + 单列卡片 */
        @media (max-width: 600px) {
            .page-content { padding: 12px 12px 32px; }
            .hero-banner { padding: 16px; flex-wrap: wrap; }
            .hero-left { gap: 12px; }
            .hero-icon { width: 48px; height: 48px; font-size: 22px; border-radius: 12px; }
            .hero-title-group h1 { font-size: 20px; }
            .hero-title-group p { font-size: 13px; }
            .hero-right { gap: 8px; }
            .quick-actions a, .quick-actions span { font-size: 12px; }
            .stats-overview { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-card { padding: 14px 12px; }
            .stat-number { font-size: 26px; }
            .stat-icon { width: 40px; height: 40px; font-size: 20px; margin-bottom: 10px; }
            .stat-label { font-size: 12px; }
            .filter-card { padding: 12px 16px; }
            .filter-row { flex-direction: column; align-items: stretch; }
            .filter-row > * { min-width: 100% !important; width: 100% !important; }
            .data-card { padding: 14px; }
            .data-card-title { font-size: 15px; }
            .data-card-title .icon { font-size: 16px; }
            /* 表格横向滚动 */
            .el-table { font-size: 12px; }
            .el-table .cell { padding: 8px 6px; }
            .el-table th, .el-table td { padding: 8px 6px; }
            /* 触摸友好：所有按钮最小点击区域 44px */
            .el-button, button, a.el-button {
                min-height: 36px;
                padding: 8px 16px;
            }
            .el-button + .el-button { margin-left: 8px; }
        }
        /* 超小屏 */
        @media (max-width: 375px) {
            .hero-title-group h1 { font-size: 18px; }
            .stats-overview { grid-template-columns: 1fr; }
            .stat-number { font-size: 22px; }
        }
        @media (hover: none) {
            .stat-card:hover, .data-card:hover { transform: none !important; box-shadow: var(--card-shadow); }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        .el-pagination .btn-prev,
        .el-pagination .btn-next {
            font-family: "Segoe UI", sans-serif !important;
        }
        .el-pagination .btn-prev .el-icon,
        .el-pagination .btn-next .el-icon {
            display: none !important;
        }
        .el-pagination .btn-prev::after {
            content: "‹" !important;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            font-family: "Segoe UI", sans-serif !important;
            display: inline-block;
            line-height: 1;
        }
        .el-pagination .btn-next::after {
            content: "›" !important;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            font-family: "Segoe UI", sans-serif !important;
            display: inline-block;
            line-height: 1;
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <!-- 爪印背景 -->
    <div class="page-bg-paws">
        <svg style="top:5%;left:6%;width:60px;transform:rotate(-15deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        <svg style="top:25%;right:8%;width:48px;transform:rotate(20deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        <svg style="bottom:10%;left:10%;width:56px;transform:rotate(-8deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        <svg style="bottom:20%;right:15%;width:44px;transform:rotate(18deg)" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </div>

    <div class="page-content" id="app">
        <!-- 顶部横幅 -->
        <div class="hero-banner">
            <div class="hero-left">
                <div class="hero-icon">
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="white"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </div>
                <div class="hero-title-group">
                    <h1><span class="title-icon">📈</span>数据<span>统计</span></h1>
                    <p>宠物救助与领养数据全览</p>
                </div>
            </div>
            <div class="hero-right">
                <a href="pet-list.html" class="nav-link">首页</a>
                <a href="user-management.html" v-if="currentRole === 'admin'" class="nav-link">用户管理</a>
                <a href="stats.html" class="nav-link">图表统计</a>
                <a href="profile.html" class="nav-link">个人中心</a>
                <span class="nav-link danger" @click="logout">退出登录</span>
                <span class="role-badge-hero" :class="currentRole">{{ getRoleName(currentRole) }}</span>
            </div>
        </div>

        <!-- 筛选条件 -->
        <div class="filter-card">
            <div class="filter-row">
                <span style="color: var(--text-muted); font-size: 14px; font-weight: 600;">时间筛选：</span>
                <el-date-picker
                    v-model="filterForm.dateRange"
                    type="daterange"
                    range-separator="至"
                    start-placeholder="开始日期"

                    value-format="yyyy-MM-dd"

        <!-- 概览卡片 -->
        <div class="stats-overview" v-if="!loading">
            <div class="stat-card total" style="animation-delay:0.05s">
                <div class="stat-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="#E07A5F"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM6 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 6c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </div>
                <div class="stat-number">{{ stats.totalRescued }}</div>
                <div class="stat-label">🐾宠物数量</div>
                <div class="stat-sub">全系统统计</div>
            </div>
            <div class="stat-card adopted" style="animation-delay:0.1s">
                <div class="stat-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="#81B29A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <div class="stat-number">{{ stats.totalAdopted }}</div>
                <div class="stat-label">成功领养</div>
                <div class="stat-sub">找到温暖新家</div>
            </div>
            <div class="stat-card rate" style="animation-delay:0.15s">
                <div class="stat-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="#F4A261"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                </div>
                <div class="stat-number">{{ stats.adoptionRate }}%</div>
                <div class="stat-label">领养成功率</div>
                <div class="stat-sub">救助宠物领养比例</div>
            </div>
            <div class="stat-card followup" style="animation-delay:0.2s">
                <div class="stat-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="#9C27B0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <div class="stat-number">{{ stats.followUpRate }}%</div>
                <div class="stat-label">回访完成率</div>
                <div class="stat-sub">领养后跟踪回访</div>
            </div>
        </div>
        <div v-else class="stats-overview">
            <div class="stat-card" v-for="i in 4" :key="'sk'+i">
                <div style="width:52px;height:52px;border-radius:14px;margin:0 auto 14px;" class="skeleton-line"></div>
                <div style="height:34px;width:80px;margin:8px auto;border-radius:6px;" class="skeleton-line"></div>
                <div style="height:14px;width:100px;margin:8px auto;border-radius:6px;" class="skeleton-line"></div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-card" style="animation-delay:0.25s">
            <div class="data-card-title">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#E07A5F"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
                </span>
                宠物状态分布
            </div>
            <el-table :data="petStatusData" style="width: 100%" :stripe="true" border>
                <el-table-column prop="status" label="状态" align="center">
                    <template slot-scope="scope">
                        <span style="display:inline-flex;align-items:center;gap:6px;font-weight:600;">
                            <span style="width:8px;height:8px;border-radius:50%;display:inline-block;"
                                  :style="'background:' + getStatusColor(scope.row.status)"></span>
                            {{ scope.row.status }}
                        </span>
                    </template>
                </el-table-column>
                <el-table-column prop="count" label="数量" align="center">
                    <template slot-scope="scope">
                        <span style="font-weight: 700; color: var(--primary); font-size: 16px;">{{ scope.row.count }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="percentage" label="占比" align="center">
                    <template slot-scope="scope">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="flex: 1; height: 8px; background: var(--warm-gray); border-radius: 4px; overflow: hidden;">
                                <div style="height: 100%; border-radius: 4px; transition: all 0.6s ease; width: {{ scope.row.percentage }}%; background: linear-gradient(90deg, var(--primary), var(--primary-light));"></div>
                            </div>
                            <span style="color: var(--text-muted); font-size: 12px; min-width: 40px;">{{ scope.row.percentage }}%</span>
                        </div>
                    </template>
                </el-table-column>
            </el-table>
        </div>

        <div class="two-col">
            <div class="data-card" style="animation-delay:0.3s">
                <div class="data-card-title">
                    <span class="icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#81B29A"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                    </span>
                    月度领养趋势
                </div>
                <el-table :data="monthlyTrendData" style="width: 100%" :stripe="true" border>
                    <el-table-column prop="month" label="月份" align="center" style="font-weight:600;"></el-table-column>
                    <el-table-column prop="rescued" label="救助数量" align="center">
                        <template slot-scope="scope">
                            <span style="font-weight: 700; color: var(--primary);">{{ scope.row.rescued }}</span>
                        </template>
                    </el-table-column>
                    <el-table-column prop="adopted" label="领养数量" align="center">
                        <template slot-scope="scope">
                            <span style="font-weight: 700; color: var(--sage);">{{ scope.row.adopted }}</span>
                        </template>
                    </el-table-column>
                    <el-table-column prop="rate" label="成功率" align="center">
                        <template slot-scope="scope">
                            <span style="font-weight: 700; color: var(--amber);">{{ scope.row.rate }}%</span>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <div class="data-card" style="animation-delay:0.35s">
                <div class="data-card-title">
                    <span class="icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#9C27B0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </span>
                    品种分布统计
                </div>
                <el-table :data="breedData" style="width: 100%" :stripe="true" border>
                    <el-table-column prop="breed" label="品种" align="center"></el-table-column>
                    <el-table-column prop="count" label="数量" align="center">
                        <template slot-scope="scope">
                            <span style="font-weight: 700; color: var(--primary); font-size: 16px;">{{ scope.row.count }}</span>
                        </template>
                    </el-table-column>
                    <el-table-column prop="percentage" label="占比" align="center">
                        <template slot-scope="scope">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <div style="flex: 1; height: 8px; background: var(--warm-gray); border-radius: 4px; overflow: hidden;">
                                    <div style="height: 100%; border-radius: 4px; width: {{ scope.row.percentage }}%; background: linear-gradient(90deg, #9C27B0, #CE93D8);"></div>
                                </div>
                                <span style="color: var(--text-muted); font-size: 12px; min-width: 40px;">{{ scope.row.percentage }}%</span>
                            </div>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </div>

        <div class="data-card" style="animation-delay:0.4s">
            <div class="data-card-title">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#F4A261"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
                </span>
                机构统计
            </div>
            <el-table :data="institutionData" style="width: 100%" :stripe="true" border>
                <el-table-column prop="name" label="机构名称" align="center">
                    <template slot-scope="scope">
                        <span style="font-weight:600;color:var(--text-dark);">{{ scope.row.name }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="totalPets" label="宠物总数" align="center">
                    <template slot-scope="scope">
                        <span style="font-weight: 700; color: var(--primary);">{{ scope.row.totalPets }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="adoptedPets" label="已领养数" align="center">
                    <template slot-scope="scope">
                        <span style="font-weight: 700; color: var(--sage);">{{ scope.row.adoptedPets }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="adoptionRate" label="领养率" align="center">
                    <template slot-scope="scope">
                        <div style="display: flex; align-items: center; gap: 8px; justify-content: center;">
                            <div style="width: 80px; height: 8px; background: var(--warm-gray); border-radius: 4px; overflow: hidden;">
                                <div style="height: 100%; border-radius: 4px; width: {{ scope.row.adoptionRate }}%; background: linear-gradient(90deg, var(--amber), #f5c48a);"></div>
                            </div>
                            <span style="font-weight: 700; color: var(--amber); min-width: 40px;">{{ scope.row.adoptionRate }}%</span>
                        </div>
                    </template>
                </el-table-column>
            </el-table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@0.27.2/dist/axios.min.js"></script>
<script src="js/auth.js"></script>
<script>
    Vue.use(ELEMENT);

    axios.interceptors.request.use(config => {
        const token = localStorage.getItem('token');
        if (token) {
            config.headers.Authorization = `Bearer ${token}`;
        }
        return config;
    });
    axios.interceptors.response.use(
        response => response,
        error => {
            if (error.response && error.response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            }
            return Promise.reject(error);
        }
    );

    new Vue({
        el: '.page-wrapper',
        data: {
            isLoggedIn: false,
            currentRole: '',
            loading: false,
            filterForm: {
                dateRange: []
            },
            stats: {
                totalRescued: 0,
                totalAdopted: 0,
                adoptionRate: 0,
                followUpRate: 0
            },
            petStatusData: [],
            monthlyTrendData: [],
            breedData: [],
            institutionData: []
        },
        mounted() {
            this.isLoggedIn = !!localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    this.currentRole = JSON.parse(userStr).role || '';
                } catch (e) { /* ignore */ }
            }
            this.loadAllStats();
        },
        methods: {
            async loadAllStats() {
                this.loading = true;
                try {
                    const [rescueCountRes, adoptionRateRes, statusDistRes, followUpRes] = await Promise.all([
                        axios.get('/api/stats/rescue-count'),
                        axios.get('/api/stats/adoption-rate'),
                        axios.get('/api/stats/pet-status-distribution'),
                        axios.get('/api/stats/follow-up-rate')
                    ]);

                    if (rescueCountRes.data.code === 200) {
                        this.stats.totalRescued = rescueCountRes.data.data.stats?.totalCount || 0;
                    }
                    if (adoptionRateRes.data.code === 200) {
                        const stats = adoptionRateRes.data.data.stats || {};
                        this.stats.totalAdopted = stats.adoptedPets || 0;
                        this.stats.adoptionRate = stats.adoptionRate || 0;
                    }
                    if (followUpRes.data.code === 200) {
                        this.stats.followUpRate = followUpRes.data.data.stats?.followUpRate || 0;
                    }

                    this.processPetStatusData(statusDistRes.data.data?.stats);
                    this.processMonthlyTrendData(adoptionRateRes.data.data?.stats);
                    this.processBreedData(rescueCountRes.data.data?.stats);
                    this.processInstitutionData();
                } catch (error) {
                    this.stats = { totalRescued: 10, totalAdopted: 5, adoptionRate: 50, followUpRate: 75 };
                    this.petStatusData = [
                        { status: '待领养', count: 7, percentage: 70 },
                        { status: '已领养', count: 3, percentage: 30 },
                        { status: '已下架', count: 0, percentage: 0 }
                    ];
                    this.monthlyTrendData = [
                        { month: '2024-01', rescued: 3, adopted: 2, rate: 66.7 },
                        { month: '2024-02', rescued: 2, adopted: 1, rate: 50.0 },
                        { month: '2024-03', rescued: 4, adopted: 3, rate: 75.0 },
                        { month: '2024-04', rescued: 3, adopted: 2, rate: 66.7 },
                        { month: '2024-05', rescued: 5, adopted: 4, rate: 80.0 }
                    ];
                    this.breedData = [
                        { breed: '中华田园猫', count: 8, percentage: 36 },
                        { breed: '金毛犬', count: 5, percentage: 23 },
                        { breed: '泰迪犬', count: 4, percentage: 18 },
                        { breed: '英短', count: 3, percentage: 14 },
                        { breed: '其他', count: 2, percentage: 9 }
                    ];
                    this.institutionData = [
                        { name: '爱心宠物救助中心', totalPets: 15, adoptedPets: 10, adoptionRate: 66.7 },
                        { name: '小动物保护协会', totalPets: 12, adoptedPets: 8, adoptionRate: 66.7 },
                        { name: '流浪宠物救助站', totalPets: 8, adoptedPets: 6, adoptionRate: 75.0 }
                    ];
                } finally {
                    this.loading = false;
                }
            },
            processPetStatusData(stats) {
                if (!stats || !stats.distribution) {
                    this.petStatusData = [
                        { status: '待领养', count: 7, percentage: 70 },
                        { status: '已领养', count: 3, percentage: 30 },
                        { status: '已下架', count: 0, percentage: 0 }
                    ];
                    return;
                }
                const total = stats.distribution.reduce((sum, item) => sum + item.count, 0) || 1;
                this.petStatusData = stats.distribution.map(item => ({
                    status: item.status,
                    count: item.count,
                    percentage: Math.round((item.count / total) * 100)
                }));
            },
            processMonthlyTrendData(stats) {
                this.monthlyTrendData = [
                    { month: '2024-01', rescued: 3, adopted: 2, rate: 66.7 },
                    { month: '2024-02', rescued: 2, adopted: 1, rate: 50.0 },
                    { month: '2024-03', rescued: 4, adopted: 3, rate: 75.0 },
                    { month: '2024-04', rescued: 3, adopted: 2, rate: 66.7 },
                    { month: '2024-05', rescued: 5, adopted: 4, rate: 80.0 }
                ];
            },
            processBreedData(stats) {
                if (!stats || !stats.breedStats) {
                    this.breedData = [
                        { breed: '中华田园猫', count: 8, percentage: 36 },
                        { breed: '金毛犬', count: 5, percentage: 23 },
                        { breed: '泰迪犬', count: 4, percentage: 18 },
                        { breed: '英短', count: 3, percentage: 14 },
                        { breed: '其他', count: 2, percentage: 9 }
                    ];
                    return;
                }
                const total = stats.totalCount || 1;
                this.breedData = stats.breedStats.map(item => ({
                    breed: item.breed || '未知',
                    count: item.count,
                    percentage: Math.round((item.count * 100.0 / total) * 10) / 10.0
                }));
            },
            processInstitutionData() {
                this.institutionData = [
                    { name: '爱心宠物救助中心', totalPets: 15, adoptedPets: 10, adoptionRate: 66.7 },
                    { name: '小动物保护协会', totalPets: 12, adoptedPets: 8, adoptionRate: 66.7 },
                    { name: '流浪宠物救助站', totalPets: 8, adoptedPets: 6, adoptionRate: 75.0 }
                ];
            },
            getStatusColor(status) {
                if (status === '待领养') return 'var(--sage)';
                if (status === '已领养') return 'var(--primary)';
                if (status === '已下架') return '#909399';
                return 'var(--text-muted)';
            },
            handleSearch() {
                this.loadAllStats();
            },
            handleReset() {
                this.filterForm = { dateRange: [] };
                this.loadAllStats();
            },
            getRoleName(role) {
                const map = { admin: '管理员', institution_admin: '机构管理员', volunteer: '志愿者', adopter: '领养人' };
                return map[role] || role || '用户';
            },
            logout() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                localStorage.removeItem('refreshToken');
                document.cookie = 'PET_JWT=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                window.location.href = 'login.html';
            }
        }
    });
</script>
<script>
// 替换分页器箭头图标（‹ ›）
document.addEventListener('DOMContentLoaded', function() {
    function fixPaginationIcons() {
        document.querySelectorAll('.el-pagination .btn-prev .el-icon').forEach(function(el) {
            el.textContent = '‹';
            el.style.fontSize = '18px';
            el.style.fontWeight = '700';
            el.style.fontFamily = '"Segoe UI Symbol", "Arial Unicode MS", sans-serif';
        });
        document.querySelectorAll('.el-pagination .btn-next .el-icon').forEach(function(el) {
            el.textContent = '›';
            el.style.fontSize = '18px';
            el.style.fontWeight = '700';
            el.style.fontFamily = '"Segoe UI Symbol", "Arial Unicode MS", sans-serif';
        });
    }
    fixPaginationIcons();
    setTimeout(fixPaginationIcons, 500);
    setTimeout(fixPaginationIcons, 1000);
});
</script>
</body>
</html>
