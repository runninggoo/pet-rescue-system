<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物救助收养系统 - 登录</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }
        .el-input {
            margin-bottom: 20px;
        }
        .el-button {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="app" class="login-container">
        <h2 class="login-title">宠物救助收养系统</h2>
        <el-form :model="loginForm" :rules="rules" ref="loginForm">
            <el-form-item prop="phone">
                <el-input v-model="loginForm.phone" placeholder="请输入手机号" prefix-icon="el-icon-user"></el-input>
            </el-form-item>
            <el-form-item prop="password">
                <el-input v-model="loginForm.password" type="password" placeholder="请输入密码" prefix-icon="el-icon-lock"></el-input>
            </el-form-item>
            <el-form-item>
                <el-button type="primary" @click="handleLogin" :loading="loading">登录</el-button>
            </el-form-item>
            <el-form-item>
                <el-button @click="handleRegister">注册新账号</el-button>
            </el-form-item>
        </el-form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios@0.27.2/dist/axios.min.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                loginForm: {
                    phone: '13800000000',
                    password: '123456'
                },
                rules: {
                    phone: [
                        { required: true, message: '请输入手机号', trigger: 'blur' },
                        { pattern: /^1[3-9]\d{9}$/, message: '手机号格式不正确', trigger: 'blur' }
                    ],
                    password: [
                        { required: true, message: '请输入密码', trigger: 'blur' },
                        { min: 6, message: '密码长度不能少于6位', trigger: 'blur' }
                    ]
                },
                loading: false
            },
            methods: {
                handleLogin() {
                    this.$refs.loginForm.validate(valid => {
                        if (valid) {
                            this.loading = true;
                            axios.post('/api/auth/login', this.loginForm)
                                .then(response => {
                                    this.loading = false;
                                    const data = response.data;
                                    if (data.code === 200) {
                                        localStorage.setItem('token', data.data.token);
                                        localStorage.setItem('user', JSON.stringify(data.data.user));
                                        this.$message.success('登录成功！');
                                        window.location.href = 'pet-list.html';
                                    } else {
                                        this.$message.error(data.message);
                                    }
                                })
                                .catch(error => {
                                    this.loading = false;
                                    this.$message.error('登录失败：' + error.message);
                                });
                        }
                    });
                },
                handleRegister() {
                    this.$message.info('注册功能开发中...');
                }
            }
        });
    </script>
</body>
</html>
